<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제품 및 설비 관리 대시보드</title>
    <style>
        /* 기본 스타일 초기화 및 레이아웃 */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; }
        body { background-color: #f8f9fa; color: #333; line-height: 1.6; }
        a { text-decoration: none; color: inherit; }

        /* 대시보드 및 헤더 */
        .dashboard-header {
            position: sticky;
            top: 0;
            background: #ffffff;
            border-bottom: 1px solid #e9ecef;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }
        .nav-links button {
            background: none;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            color: #495057;
            transition: color 0.2s;
        }
        .nav-links button:hover { color: #007bff; }
        
        .lang-btn {
            background: #212529;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        /* 제품 섹션 공통 */
        .dashboard-section { padding: 80px 20px 40px; max-width: 1200px; margin: 0 auto; }
        .section-title { font-size: 24px; margin-bottom: 20px; border-left: 5px solid #007bff; padding-left: 10px; }
        
        /* 슬라이더 시스템 구조 */
        .slider-container { position: relative; overflow: hidden; background: #fff; border: 1px solid #dee2e6; border-radius: 8px; margin-bottom: 20px; }
        .slider-track { display: flex; transition: transform 0.4s ease-in-out; }
        .slide-item { min-width: 100%; flex-shrink: 0; padding: 20px; text-align: center; }
        .slide-item img { max-width: 100%; height: auto; border-radius: 4px; }
        
        /* 슬라이더 컨트롤러 버튼 */
        .slider-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.5); color: #fff; border: none;
            padding: 12px 16px; cursor: pointer; z-index: 10; border-radius: 4px;
        }
        .slider-btn:disabled { background: rgba(0,0,0,0.1); cursor: not-allowed; }
        .prev-btn { left: 10px; }
        .next-btn { right: 10px; }

        /* 하단 캡션 및 배지 */
        .slide-caption-box { text-align: center; padding: 15px; background: #f1f3f5; font-weight: bold; }
        .badge { display: inline-block; padding: 4px 8px; background: #007bff; color: #fff; border-radius: 4px; font-size: 12px; margin-bottom: 5px; }

        /* 파일 다운로드 버튼 스타일 */
        .download-container { text-align: center; margin: 25px 0 40px; }
        .pdf-download-btn {
            display: inline-block; padding: 14px 28px; background-color: #198754; color: #ffffff;
            font-size: 16px; font-weight: bold; border-radius: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.3s, transform 0.2s;
        }
        .pdf-download-btn:hover { background-color: #157347; transform: translateY(-2px); }

        /* 특허 라이트박스 모달 */
        .patent-lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .patent-lightbox.active { display: flex; }
        .patent-lightbox-img { max-width: 90%; max-height: 90%; border-radius: 4px; }
        .patent-lightbox-close { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; cursor: pointer; }

        /* 도트 인디케이터 */
        .patent-dots { text-align: center; margin-top: 10px; }
        .patent-dot { display: inline-block; width: 12px; height: 12px; background: #ccc; border-radius: 50%; margin: 0 5px; cursor: pointer; }
        .patent-dot.active { background: #007bff; }

        /* 푸터 영역 */
        .footer-section { background: #343a40; color: #fff; padding: 40px 20px; margin-top: 6px; }
        .info-item { margin-bottom: 10px; }
        .info-title { font-weight: bold; margin-right: 10px; color: #adb5bd; }
        
        /* 구글 번역기 숨김 처리 기믹 */
        #google_translate_element { display: none; }
        .goog-te-banner-frame { display: none !important; }
        body { top: 0px !important; }
    </style>
</head>
<body>

    <header class="dashboard-header">
        <div class="logo"><strong>FACILITY DASHBOARD</strong></div>
        <nav class="nav-links">
            <button onclick="scrollToProduct('system02')">로봇 시스템</button>
            <button onclick="scrollToProduct('system03')">레일 스토퍼</button>
            <button onclick="scrollToProduct('system04')">원심분리기</button>
            <button onclick="scrollToProduct('system07')">자동 도어</button>
            <button onclick="scrollToProduct('patentSection')">기술 특허</button>
        </nav>
        <button class="lang-btn" id="langToggleBtn" onclick="toggleLanguage()">EN</button>
    </header>

    <div id="google_translate_element"></div>

    <section id="system02" class="dashboard-section">
        <h2 class="section-title">System 02 · 초고온 측정 로봇 시스템 도면</h2>
        <div class="slider-container">
            <button class="slider-btn prev-btn" id="robotPrevBtn" onclick="changeRobotSlide(-1)" disabled>❮</button>
            <button class="slider-btn next-btn" id="robotNextBtn" onclick="changeRobotSlide(1)">❯</button>
            <div class="slider-track" id="robotTrack" style="width: 400%;">
                <div class="slide-item" style="width: 25%;"><img src="images/robot1.jpg" alt="로봇 도면 1"></div>
                <div class="slide-item" style="width: 25%;"><img src="images/robot2.jpg" alt="로봇 도면 2"></div>
                <div class="slide-item" style="width: 25%;"><img src="images/robot3.jpg" alt="로봇 도면 3"></div>
                <div class="slide-item" style="width: 25%;"><img src="images/robot4.jpg" alt="로봇 도면 4"></div>
            </div>
        </div>
    </section>

    <section id="system03" class="dashboard-section">
        <h2 class="section-title">System 03 · 레일 스토퍼 시스템 도면</h2>
        <div class="slider-container">
            <button class="slider-btn prev-btn" id="stopperPrevBtn" onclick="changeStopperSlide(-1)" disabled>❮</button>
            <button class="slider-btn next-btn" id="stopperNextBtn" onclick="changeStopperSlide(1)">❯</button>
            <div class="slider-track" id="stopperTrack" style="width: 200%;">
                <div class="slide-item" style="width: 50%;"><img src="images/stopper1.jpg" alt="스토퍼 도면 1"></div>
                <div class="slide-item" style="width: 50%;"><img src="images/stopper2.jpg" alt="스토퍼 도면 2"></div>
            </div>
        </div>
    </section>

    <section id="system04" class="dashboard-section">
        <h2 class="section-title">System 04 · 필터 원심분리기 시스템 도면</h2>
        <div class="slider-container">
            <button class="slider-btn prev-btn" id="prevBtn" onclick="changeSlide(-1)" disabled>❮</button>
            <button class="slider-btn next-btn" id="nextBtn" onclick="changeSlide(1)">❯</button>
            <div class="slider-track" id="blueprintTrack" style="width: 200%;">
                <div class="slide-item" style="width: 50%;"><img src="images/centrifuge1.jpg" alt="원심분리기 도면 1"></div>
                <div class="slide-item" style="width: 50%;"><img src="images/centrifuge2.jpg" alt="원심분리기 도면 2"></div>
            </div>
        </div>

        <div class="download-container">
            <a href="files/filter-centrifuge-spec-raod.pdf" class="pdf-download-btn" download="필터 원심 분리기 제품 사양 RAOD.pdf">
                💾 필터 원심 분리기 제품 사양 RAOD 다운로드 (PDF)
            </a>
        </div>
    </section>

    <section id="system07" class="dashboard-section">
        <h2 class="section-title">System 07 · 자동 도어 장치 시스템</h2>
        <div class="slider-container">
            <button class="slider-btn prev-btn" id="autodoorPrevBtn" onclick="changeAutodoorSlide(-1)" disabled>❮</button>
            <button class="slider-btn next-btn" id="autodoorNextBtn" onclick="changeAutodoorSlide(1)">❯</button>
            <div class="slider-track" id="autodoorTrack" style="width: 200%;">
                <div class="slide-item" style="width: 50%;"><img src="images/autodoor1.jpg" alt="자동도어 구성도"></div>
                <div class="slide-item" style="width: 50%;"><img src="images/autodoor2.jpg" alt="자동도어 설치도"></div>
            </div>
            <div class="slide-caption-box" id="autodoorCaption">구성도</div>
        </div>
    </section>

    <section id="patentSection" class="dashboard-section">
        <h2 class="section-title">원심분리기 기술 특허 인증</h2>
        <div class="slider-container" onclick="openPatentLightbox()" style="cursor: pointer;">
            <div class="slider-track" id="patentTrack" style="width: 200%;">
                <div class="slide-item" style="width: 50%;"><img src="images/tt.jpg" alt="특허 서류 1"></div>
                <div class="slide-item" style="width: 50%;"><img src="images/t.jpg" alt="특허 서류 2"></div>
            </div>
            <div class="slide-caption-box">
                <span class="badge" id="patentStepBadge">STEP 01 · 출원번호통지서</span>
                <div id="patentCaption">특허 출원번호통지서 (출원 접수 완료)</div>
            </div>
        </div>
        <div class="patent-dots">
            <span class="patent-dot active" onclick="event.stopPropagation(); goPatentSlide(0)"></span>
            <span class="patent-dot" onclick="event.stopPropagation(); goPatentSlide(1)"></span>
        </div>
    </section>

    <footer class="footer-section">
        <div class="info-item">
            <span class="info-title">Official E-mail</span>
            <span class="info-value"><a href="mailto:usjsf@hanmail.net">usjsf@hanmail.net</a></span>
        </div>
    </footer>

    <div class="patent-lightbox" id="patentLightbox" onclick="closePatentLightbox()">
        <span class="patent-lightbox-close" onclick="closePatentLightbox()">✕</span>
        <img src="" alt="특허 확대" class="patent-lightbox-img" id="patentLightboxImg" onclick="event.stopPropagation()">
    </div>

    <script type="text/javascript">
        // 부드러운 스크롤 이동 연산 구현
        function scrollToProduct(id) {
            const target = document.getElementById(id);
            if (target) {
                const totalOffset = 85; 
                window.scrollTo({ top: target.getBoundingClientRect().top + window.pageYOffset - totalOffset, behavior: 'smooth' });
            }
        }

        // 인덱스 전역 스코프 변수 정의
        let currentSlideIdx = 0, robotSlideIdx = 0, stopperSlideIdx = 0, autodoorSlideIdx = 0, patentSlideIdx = 0;
        
        // 원심분리기 슬라이드 (System 04)
        function changeSlide(dir) {
            currentSlideIdx = Math.max(0, Math.min(1, currentSlideIdx + dir));
            document.getElementById('blueprintTrack').style.transform = `translateX(-${currentSlideIdx * 50}%)`;
            document.getElementById('prevBtn').disabled = (currentSlideIdx === 0);
            document.getElementById('nextBtn').disabled = (currentSlideIdx === 1);
        }
        
        // 로봇 시스템 슬라이드 (System 02)
        function changeRobotSlide(dir) {
            robotSlideIdx = Math.max(0, Math.min(3, robotSlideIdx + dir));
            document.getElementById('robotTrack').style.transform = `translateX(-${robotSlideIdx * 25}%)`;
            document.getElementById('robotPrevBtn').disabled = (robotSlideIdx === 0);
            document.getElementById('robotNextBtn').disabled = (robotSlideIdx === 3);
        }
        
        // 레일 스토퍼 슬라이드 (System 03)
        function changeStopperSlide(dir) {
            stopperSlideIdx = Math.max(0, Math.min(1, stopperSlideIdx + dir));
            document.getElementById('stopperTrack').style.transform = `translateX(-${stopperSlideIdx * 50}%)`;
            document.getElementById('stopperPrevBtn').disabled = (stopperSlideIdx === 0);
            document.getElementById('stopperNextBtn').disabled = (stopperSlideIdx === 1);
        }

        // 자동 도어 슬라이드 (System 07)
        const autodoorLabels = ['구성도', '설치도'];
        function changeAutodoorSlide(dir) {
            autodoorSlideIdx = Math.max(0, Math.min(1, autodoorSlideIdx + dir));
            document.getElementById('autodoorTrack').style.transform = `translateX(-${autodoorSlideIdx * 50}%)`;
            document.getElementById('autodoorPrevBtn').disabled = (autodoorSlideIdx === 0);
            document.getElementById('autodoorNextBtn').disabled = (autodoorSlideIdx === 1);
            document.getElementById('autodoorCaption').innerText = autodoorLabels[autodoorSlideIdx];
        }

        // 특허 슬라이더 레이블 정의 및 연동
        const patentLabels = [
            { badge: 'STEP 01 · 출원번호통지서', caption: '특허 출원번호통지서 (출원 접수 완료)' },
            { badge: 'STEP 02 · 특허증', caption: '특허증 (정식 등록 완료)' }
        ];
        function goPatentSlide(idx) {
            patentSlideIdx = idx;
            document.getElementById('patentTrack').style.transform = `translateX(-${idx * 50}%)`;
            document.getElementById('patentStepBadge').innerText = patentLabels[idx].badge;
            document.getElementById('patentCaption').innerText = patentLabels[idx].caption;
            document.querySelectorAll('.patent-dot').forEach((dot, i) => dot.classList.toggle('active', i === idx));
        }

        // 특허 모달 오픈/클로즈 스크롤 바 차단 인터랙션
        function openPatentLightbox() {
            const imgSrc = patentSlideIdx === 0 ? 'images/tt.jpg' : 'images/t.jpg';
            document.getElementById('patentLightboxImg').src = imgSrc;
            document.getElementById('patentLightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closePatentLightbox() {
            document.getElementById('patentLightbox').classList.remove('active');
            document.body.style.overflow = '';
        }

        // 구글 번역 연동 API 래퍼 함수
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({ pageLanguage: 'ko', includedLanguages: 'ko,en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE }, 'google_translate_element');
        }
        let currentLang = 'ko';
        function toggleLanguage() {
            const btn = document.getElementById('langToggleBtn');
            if (currentLang === 'ko') { changeGoogleLanguage('en'); currentLang = 'en'; btn.innerText = 'KR'; }
            else { changeGoogleLanguage('ko'); currentLang = 'ko'; btn.innerText = 'EN'; }
        }
        function changeGoogleLanguage(langCode) {
            const select = document.querySelector('.goog-te-combo');
            if (select) { select.value = langCode; select.dispatchEvent(new Event('change')); }
            else { setTimeout(() => { changeGoogleLanguage(langCode); }, 300); }
        }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
